<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imagine - Visual Creation Suite</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Imagine</h1>
  <p>Visual Creation Suite</p>
</header>

<main>

  <section class="modules">

    <div class="card" onclick="openModule('diagram')">
      <h2>Diagram</h2>
      <p>Flowcharts & estructuras</p>
    </div>

    <div class="card" onclick="openModule('mockup')">
      <h2>Mockup</h2>
      <p>Interfaces UI</p>
    </div>

    <div class="card" onclick="openModule('interactive')">
      <h2>Interactive</h2>
      <p>Experiencias dinámicas</p>
    </div>

    <div class="card" onclick="openModule('chart')">
      <h2>Chart</h2>
      <p>Datos & gráficos</p>
    </div>

    <div class="card" onclick="openModule('art')">
      <h2>Art</h2>
      <p>Ilustraciones</p>
    </div>

  </section>

  <section id="output">
    <h2>Resultado</h2>
    <div id="resultBox">
      Seleccioná un módulo para empezar
    </div>
  </section>

</main>

<footer>
  <p>© 2026 Imagine Suite</p>
</footer>

<script src="script.js"></script>
</body>
</html>
